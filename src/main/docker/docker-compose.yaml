---
networks:
  default:
    driver: bridge

volumes:
  certificates:
  jobs:
  logs:
  loki:
  prometheus:
  grafana:

services:
  # ***************************
  # Data Transfer components
  # ***************************
  # SSL terminator
  cert:
    container_name: data-transfer-ssl
    image: eosc/data-transfer-ssl:latest
    build:
      context: cert/
      args:
        - SERVICE_DOMAIN=${SERVICE_DOMAIN}
        - SERVICE_EMAIL=${SERVICE_EMAIL}
        - SERVICE=api:8089
        - GRAFANA_URL=http://grafana:3000
        - TELEMETRY_URL=${OTEL_COLLECTOR_ADDR}
        - CORS_ORIGINS=${CORS_ORIGINS:-.*}
        - CORS_HEADERS=${CORS_HEADERS:-Authorization,Authorization-Storage,Origin,Accept,Content-Type}
        - CORS_METHODS=${CORS_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
    links:
      - api
      - grafana
    volumes:
      - certificates:/etc/letsencrypt
    healthcheck:
      test: ['CMD', '/opt/status.sh']
      start_period: 30s
      interval: 1m
      timeout: 5s
    restart: unless-stopped
    ports:
      - "80:80"
      - "${SERVICE_PORT}:443"
      - "${TELEMETRY_PORT}:8080"

  # Data transfer service
  api:
    image: registry.egi.eu/eosc-beyond.eu/eosc-data-transfer
    container_name: data-transfer-api
    environment:
      - EOSC_TRANSFER_SERVICE_FTS_URL=${FTS_URL:-https://fts-egi.cern.ch:8446}
      - EOSC_TRANSFER_SERVICE_FTS_TRUST_STORE_PASSWORD=${FTS_TRUST_STORE_PASSWORD}
      - EOSC_TRANSFER_SERVICE_FTS_TRUST_STORE_FILE=${FTS_TRUST_STORE_FILE:-cern-truststore.jks}
      - EOSC_SERVICE_ACCOUNTING_SERVER=${ACCOUNTING_SERVER}
      - EOSC_SERVICE_ACCOUNTING_INSTALLATION=${ACCOUNTING_INSTALLATION}
      - EOSC_SERVICE_ACCOUNTING_METRIC=${ACCOUNTING_METRIC}
      - EOSC_SERVICE_CHECKIN_SERVER=${CHECKIN_SERVER}
      - EOSC_SERVICE_CHECKIN_CLIENT=${CHECKIN_CLIENT}
      - EOSC_SERVICE_CHECKIN_SECRET=${CHECKIN_SECRET}
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_ENDPOINT}
      - QUARKUS_HTTP_CORS_ORIGINS=https?:\/\/${SERVICE_DOMAIN}|http:\/\/localhost:(?::\d+)?
      - QUARKUS_SMALLRYE_OPENAPI_SERVERS=https://${SERVICE_DOMAIN}${LOCAL_SERVER}
    volumes:
      - logs:/deployments/logs:rw
    ports:
      - "8081:8089"
    restart: unless-stopped
    depends_on:
      - jaeger
      - redis

  # State store (transfer jobs)
  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/etc/redis/redis.conf
      - jobs:/data
    ports:
      - "6379:6379"
    restart: unless-stopped


  # ***************************
  # Telemetry components
  # ***************************

  # OpenTelemetry collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command:
      - "--config"
      - "/etc/otelcol-config.yml"
    environment:
      LOG_LEVEL: info
    volumes:
      - ./otelcollector/otelcol-config.yml:/etc/otelcol-config.yml
      - logs:/usr/logs:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 125M
    depends_on:
      - loki

  # Loki (logs)
  loki:
    image: grafana/loki:3.6
    container_name: loki
    volumes:
      - loki:/loki
      - ./loki/loki.yaml:/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 250M
    restart: unless-stopped
    ports:
      - "${LOKI_COLLECTOR_PORT}:3100"

  # Jaeger (traces)
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    container_name: jaeger
    command:
      - "--config"
      - "/jaeger/config.yaml"
    environment:
      LOG_LEVEL: info
    volumes:
      - ./jaeger/jaeger.yaml:/jaeger/config.yaml
      - ./jaeger/jaeger-ui.json:/jaeger/config-ui.json
    ports:
      - "${JAEGER_SERVICE_PORT}:16686"  # UI and Query API
      - "${JAEGER_COLLECTOR_PORT}:4317" # gRPC receiver
      - "8888:8888"                     # Data Transfer metrics
      - "8889:8889"                     # Jaeger metrics
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M

  # Prometheus (metrics)
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config.yaml
      - --enable-feature=exemplar-storage
    volumes:
      - prometheus:/prometheus
      - ./prometheus/prometheus-config.yaml:/etc/prometheus/prometheus-config.yaml
      - ./prometheus/alerting-rules.yml:/etc/prometheus/alerting-rules.yml
    deploy:
      resources:
        limits:
          memory: 300M
    ports:
      - "${PROMETHEUS_SERVICE_PORT}:9090"
    restart: unless-stopped

  # Grafana (dashboard)
  grafana:
    image: grafana/grafana:12.3.2
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: 75M
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    ports:
      - "3000:3000"
    restart: unless-stopped
